<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Go-To Dashboard — manage links, view statistics, and configure your organization shortener." />
  <meta name="base-url" content="/redirect" />
  <title>Dashboard — Go-To</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<nav role="navigation" aria-label="Main navigation">
  <a class="nav-brand" href="index.html" aria-label="Go-To Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    Go-To
  </a>
  <div class="nav-actions">
    <button id="lang-toggle" class="btn-icon" aria-label="Switch language">中文</button>
    <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      </svg>
    </button>
    <a href="index.html" class="btn-ghost" data-i18n="nav.home"></a>
    <div id="nav-user" class="nav-user">
      <img id="nav-avatar" class="nav-avatar" src="" alt="Avatar" width="28" height="28" />
      <span id="nav-username" class="nav-username"></span>
      <button id="nav-logout" class="btn-ghost" data-i18n="nav.logout"></button>
    </div>
  </div>
</nav>

<div class="dashboard-layout">
  <aside class="sidebar" role="navigation" aria-label="Dashboard sections">
    <button class="sidebar-link active" data-panel="links" id="tab-links">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span data-i18n="dashboard.links"></span>
    </button>
    <button class="sidebar-link" data-panel="stats" id="tab-stats">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span data-i18n="dashboard.stats"></span>
    </button>
    <button class="sidebar-link" data-panel="tokens" id="tab-tokens">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span data-i18n="dashboard.tokens"></span>
    </button>
    <button class="sidebar-link" data-panel="admin" id="tab-admin" style="margin-top:auto">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      <span data-i18n="dashboard.admin"></span>
    </button>
  </aside>

  <div class="dash-content">

    <section id="panel-links" class="dash-panel active" aria-label="My Links">
      <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:1.5rem" data-i18n="dashboard.links"></h1>
      <div id="links-loading" style="color:var(--text-3);font-size:.9rem">Loading...</div>
      <div id="links-empty" class="hidden" style="color:var(--text-3);font-size:.9rem;padding:2rem 0" data-i18n="dashboard.empty"></div>
      <div id="links-table-wrap" class="hidden" style="overflow-x:auto">
        <table class="links-table" role="grid">
          <thead>
            <tr>
              <th data-i18n="dashboard.col.slug"></th>
              <th data-i18n="dashboard.col.target"></th>
              <th data-i18n="dashboard.col.type"></th>
              <th data-i18n="dashboard.col.status"></th>
              <th data-i18n="dashboard.col.expires"></th>
              <th data-i18n="dashboard.col.actions"></th>
            </tr>
          </thead>
          <tbody id="links-tbody"></tbody>
        </table>
      </div>
      <div id="links-pagination" style="margin-top:1rem;display:flex;gap:.5rem"></div>
    </section>

    <section id="panel-stats" class="dash-panel" aria-label="Statistics">
      <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:1.5rem" data-i18n="dashboard.stats"></h1>
      <p style="color:var(--text-3);font-size:.9rem">Statistics dashboard — coming in Phase 3.</p>
    </section>

    <section id="panel-tokens" class="dash-panel" aria-label="API Tokens">
      <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:1.5rem" data-i18n="dashboard.tokens"></h1>
      <p style="color:var(--text-3);font-size:.9rem">Token management — coming in Phase 3.</p>
    </section>

    <section id="panel-admin" class="dash-panel" aria-label="Admin Panel">
      <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:1.5rem" data-i18n="dashboard.admin"></h1>
      <p style="color:var(--text-3);font-size:.9rem">Admin controls — coming in Phase 4.</p>
    </section>

  </div>
</div>

<div id="error-banner" class="banner banner-error hidden" role="alert" aria-live="assertive"></div>
<div id="success-banner" class="banner banner-success hidden" role="status" aria-live="polite"></div>

<script type="module">
import { initI18n, t, setLang, getLang } from './assets/js/i18n.js'
import { api, clearToken, getUser } from './assets/js/api.js'

let currentPage = 1

function qs(s) { return document.querySelector(s) }

function updateNavUser() {
  const user = getUser()
  if (!user) { window.location.href = 'index.html'; return }
  const avatar = qs('#nav-avatar')
  const username = qs('#nav-username')
  if (avatar) avatar.src = user.avatar
  if (username) username.textContent = user.login
  qs('#tab-admin')?.classList.toggle('hidden', user.role > 2)
}

function setupTheme() {
  const btn = qs('#theme-toggle')
  const saved = localStorage.getItem('goto_theme') ?? 'dark'
  document.documentElement.setAttribute('data-theme', saved)
  btn?.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
    document.documentElement.setAttribute('data-theme', next)
    localStorage.setItem('goto_theme', next)
  })
}

function setupLang() {
  const btn = qs('#lang-toggle')
  btn?.addEventListener('click', () => {
    setLang(getLang() === 'en' ? 'zh' : 'en')
    if (btn) btn.textContent = getLang() === 'en' ? '中文' : 'EN'
  })
  if (btn) btn.textContent = getLang() === 'en' ? '中文' : 'EN'
}

function setupTabs() {
  document.querySelectorAll('.sidebar-link[data-panel]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'))
      btn.classList.add('active')
      qs(`#panel-${btn.dataset.panel}`)?.classList.add('active')
    })
  })
}

function formatDate(ts) {
  if (!ts) return '—'
  return new Date(ts * 1000).toLocaleDateString()
}

async function loadLinks(page = 1) {
  currentPage = page
  const loading = qs('#links-loading')
  const empty = qs('#links-empty')
  const tableWrap = qs('#links-table-wrap')
  const tbody = qs('#links-tbody')
  if (loading) loading.classList.remove('hidden')
  if (empty) empty.classList.add('hidden')
  if (tableWrap) tableWrap.classList.add('hidden')
  try {
    const data = await api.listLinks(page)
    if (loading) loading.classList.add('hidden')
    if (!data.links?.length) {
      empty?.classList.remove('hidden')
      return
    }
    tableWrap?.classList.remove('hidden')
    tbody.innerHTML = ''
    data.links.forEach(link => {
      const tr = document.createElement('tr')
      const slugUrl = link.type === 'SHORT'
        ? `https://go-to.workers.dev/s/${link.slug}`
        : `https://go-to.workers.dev/c/${link.slug}`
      tr.innerHTML = `
        <td><a href="${slugUrl}" target="_blank" rel="noopener" style="font-family:monospace;color:var(--accent-2)">${link.slug}</a></td>
        <td title="${link.original_url}" style="max-width:180px;overflow:hidden;text-overflow:ellipsis">${link.original_url}</td>
        <td><span class="badge badge-${link.type.toLowerCase()}">${link.type}</span></td>
        <td><span class="badge badge-${link.status}">${t('status.' + link.status)}</span></td>
        <td>${formatDate(link.expires_at)}</td>
        <td>
          <button class="action-btn" onclick="copyLink('${slugUrl}')" data-i18n="action.copy">${t('action.copy')}</button>
          <button class="action-btn danger" onclick="deleteLink('${link.slug}')" data-i18n="action.delete">${t('action.delete')}</button>
        </td>
      `
      tbody.appendChild(tr)
    })
  } catch {
    if (loading) loading.textContent = t('error.unauthorized')
  }
}

window.copyLink = async (url) => {
  try { await navigator.clipboard.writeText(url) } catch {}
}

window.deleteLink = async (slug) => {
  if (!confirm(`Delete /${slug}?`)) return
  try {
    await api.deleteLink(slug)
    loadLinks(currentPage)
  } catch {}
}

async function init() {
  await initI18n()
  setupTheme()
  setupLang()
  updateNavUser()
  setupTabs()
  qs('#nav-logout')?.addEventListener('click', () => { clearToken(); window.location.href = 'index.html' })
  await loadLinks(1)
}

init()
</script>
</body>
</html>
